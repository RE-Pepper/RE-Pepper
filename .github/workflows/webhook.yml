name: Listen and notify Discord

on:
  issue_comment:
  issues:
  pull_request_review_comment:
  pull_request_review:
  pull_request:
  branch_protection_rule:
  public:
  fork:
  workflow_run:
    workflows: ["Run Checks on the Map", "Test if Project builds"]
    types: [failed]
  watch:
  #push:
   # branches:
      #- main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Discord
        run: |
          EVENT="${{ github.event_name }}"
          USER="${{ github.actor }}"
          COLOR=10699520
          BOT_NAME="BOT:Pepper"
          REPO_URL="https://github.com/${{ github.repository }}"

          TITLE="Activity detected"
          DESC="Activity detected"
          FOOTER=""
          URL="$REPO_URL"

          case "$EVENT" in
            push)
              FULL_MSG="${{ github.event.head_commit.message }}"
              SHORT_MSG="${FULL_MSG%%$'\n'*}"
              URL="${{ github.event.head_commit.url }}"
              TITLE="New commit by $USER"
              DESC="$USER\n**${SHORT_MSG}**\n\`\`\`${FULL_MSG}\`\`\`"
              FOOTER="8ac0bf"
              if [ -z "$FULL_MSG" ]; then
                  FULL_MSG="** **"
              fi
              ;;

            pull_request)
                PR_ACTION="${{ github.event.action }}"
                PR_TITLE="${{ github.event.pull_request.title }}"
                PR_BODY="${{ github.event.pull_request.body }}"
                URL="${{ github.event.pull_request.html_url }}"

                if [ "$PR_ACTION" = "opened" ]; then
                TITLE="Pull Request opened"
                DESC="$USER\n**${PR_TITLE}**\n\`\`\`${PR_BODY}\`\`\`"
                elif [ "$PR_ACTION" = "closed" ]; then
                if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
                    TITLE="Pull Request merged"
                    DESC="$USER merged PR: **${PR_TITLE}**"
                else
                    TITLE="Pull Request closed"
                    DESC="$USER closed PR: **${PR_TITLE}**"
                fi
                fi
                if [ -z "$PR_BODY" ]; then
                    PR_BODY="** **"
                fi
                ;;

            workflow_run)
              TITLE="Workflow failed"
              DESC="${{ github.event.workflow_run.name }}"
              URL="${{ github.event.workflow_run.html_url }}"
              FOOTER="[8ac0bf](https://github.com)"
              ;;

            pull_request_review)
              REVIEW_STATE="${{ github.event.review.state }}"
              URL="${{ github.event.pull_request.html_url }}"
              TITLE="Pull Request review"
              DESC="$USER reviewed PR: $REVIEW_STATE"
              ;;

            pull_request_review_comment)
              COMMENT="${{ github.event.comment.body }}"
              if [ -z "$COMMENT" ]; then
                  COMMENT="** **"
              fi
              URL="${{ github.event.pull_request.html_url }}"
              TITLE="Pull Request comment"
              DESC="$USER commented:\n\`\`\`${COMMENT}\`\`\`"
              ;;

            issues)
                ISSUE_ACTION="${{ github.event.action }}"
                ISSUE_TITLE="${{ github.event.issue.title }}"
                URL="${{ github.event.issue.html_url }}"

                if [ -z "$ISSUE_TITLE" ]; then
                  ISSUE_TITLE="** **"
                fi
                if [ "$ISSUE_ACTION" = "opened" ]; then
                TITLE="Issue opened"
                DESC="$USER opened an issue:\n**${ISSUE_TITLE}**"
                elif [ "$ISSUE_ACTION" = "closed" ]; then
                TITLE="Issue closed"
                DESC="$USER closed issue: **${ISSUE_TITLE}**"
                fi
                ;;

            issue_comment)
              COMMENT="${{ github.event.comment.body }}"
              if [ -z "$COMMENT" ]; then
                  COMMENT="** **"
              fi
              TITLE="Issue comment"
              DESC="$USER commented:\n\`\`\`${COMMENT}\`\`\`"
              URL="${{ github.event.issue.html_url }}"
              ;;

            fork)
              TITLE="Repository forked"
              DESC="$USER forked the repository: ${{ github.event.forkee.full_name }}"
              URL="https://github.com/${{ github.event.forkee.full_name }}"
              ;;

            watch)
              TITLE="Repository starred"
              DESC="$USER starred the repository"
              ;;

            public)
              TITLE="Repository made public"
              DESC="$USER made the repository public"
              ;;

            *)
              TITLE="Activity detected"
              DESC="$USER triggered \`$EVENT\`"
              ;;
          esac

          PAYLOAD=$(jq -n \
            --arg username "$BOT_NAME" \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg footer "$FOOTER" \
            --arg url "$URL" \
            --argjson color "$COLOR" \
            --arg timestamp "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{
              username: $username,
              embeds: [
                {
                  title: $title,
                  url: (if $url != "" then $url else empty end),
                  description: $desc,
                  color: $color,
                  footer: (if $footer != "" then {text: $footer} else empty end),
                  timestamp: $timestamp
                }
              ]
            }')

            HTTP_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Content-Type: application/json" \
                -X POST \
                -d "$PAYLOAD" \
                "${{ secrets.DISCORD_WEBHOOK }}")

            if [ "$HTTP_RESPONSE" -ne 204 ]; then
                echo "❌ Discord webhook failed with status $HTTP_RESPONSE"
                exit 1
            fi

