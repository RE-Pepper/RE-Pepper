name: Listen and notify Discord

on:
  pull_request_review_comment:
  pull_request_review:
  pull_request:
  issue_comment:
  issues:
  public:
  fork:
  branch_protection_rule:
  workflow_run:
    workflows: ["Run Checks on the Map", "Test if Project builds"]
    types: [failed]
  watch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Discord
        run: |
            EVENT="${{ github.event_name }}"
            USER="${{ github.actor }}"
            COLOR=10699520
            BOT_NAME="BOT:Pepper"
            FOOTER="${{ github.repository_owner }}"
            TITLE="Activity detected"
            DESC="Activity detected"
            URL="https://github.com/${{ github.repository }}"

            format_msg() {
                local MSG="$1"
                MSG="${MSG//\`/\\\`}"   # escape backticks
                MSG="${MSG//$'\r'/}"    # remove CR
                if [ -z "${MSG// }" ]; then
                    echo "** **"
                else
                    echo "$MSG"
                fi
            }

            case "$EVENT" in
            push)
                FULL_MSG="$(format_msg "${{ github.event.head_commit.message }}")"
                SHORT_MSG="${FULL_MSG%%$'\n'*}"
                URL="${{ github.event.head_commit.url }}"
                TITLE="New commit by $USER"
                if [ "$PR_BODY" = "** **" ]; then
                    DESC="$USER: **${SHORT_MSG:-** **}**"
                else
                    DESC="$USER: **${SHORT_MSG:-** **}**\`\`\`${FULL_MSG}\`\`\`"
                fi
                ;;

            pull_request)
                PR_ACTION="${{ github.event.action }}"
                PR_TITLE="$(format_msg "${{ github.event.pull_request.title }}")"
                PR_BODY="$(format_msg "${{ github.event.pull_request.body }}")"
                URL="${{ github.event.pull_request.html_url }}"

                if [ "$PR_ACTION" = "opened" ]; then
                    if [ "$PR_BODY" = "** **" ]; then
                        DESC="$USER: **${PR_TITLE}**"
                    else
                        DESC="$USER: **${PR_TITLE}**\`\`\`${PR_BODY}\`\`\`"
                    fi
                    TITLE="Pull Request opened"
                elif [ "$PR_ACTION" = "closed" ]; then
                    if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
                        TITLE="Pull Request merged"
                    else
                        TITLE="Pull Request notlol closed"
                    fi
                    DESC="by $USER: **${PR_TITLE}**"
                else
                    exit 0
                fi
                ;;

            workflow_run)
                TITLE="Workflow failed"
                DESC="$(format_msg "${{ github.event.workflow_run.name }}")"
                ;;

            pull_request_review)
                REVIEW_STATE="$(format_msg "${{ github.event.review.state }}")"
                TITLE="Pull Request review"
                DESC="by $USER: $REVIEW_STATE"
                URL="${{ github.event.pull_request.html_url }}"
                ;;

            pull_request_review_comment)
                COMMENT="$(format_msg "${{ github.event.comment.body }}")"
                TITLE="Pull Request comment"
                DESC="by $USER: \`\`\`${COMMENT}\`\`\`"
                URL="${{ github.event.pull_request.html_url }}"
                ;;

            issues)
                ISSUE_ACTION="${{ github.event.action }}"
                ISSUE_TITLE="$(format_msg "${{ github.event.issue.title }}")"
                URL="${{ github.event.issue.html_url }}"

                if [ "$ISSUE_ACTION" = "opened" ]; then
                    TITLE="Issue opened"
                elif [ "$ISSUE_ACTION" = "closed" ]; then
                    TITLE="Issue closed"
                else
                    exit 0
                fi
                DESC="by $USER: **${ISSUE_TITLE}**"
                ;;

            issue_comment)
                COMMENT="$(format_msg "${{ github.event.comment.body }}")"
                TITLE="Issue comment"
                DESC="by $USER: \`\`\`${COMMENT}\`\`\`"
                URL="${{ github.event.issue.html_url }}"
                ;;

            fork)
                TITLE="Repository forked"
                DESC="by $USER: ${{ github.event.forkee.full_name }}"
                URL="https://github.com/${{ github.event.forkee.full_name }}"
                ;;

            watch)
                TITLE="Repository starred"
                DESC="by $USER!"
                ;;

            public)
                TITLE="Repository made public"
                DESC="by $USER..."
                ;;

            branch_protection_rule)
                TITLE="Protection rules updated"
                DESC="The protection rules of the repo were updated"

            *)
                TITLE="Activity detected"
                DESC="by $USER: \`$EVENT\`"
                ;;
            esac

            # Build and send embed
            PAYLOAD=$(jq -n \
            --arg username "$BOT_NAME" \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg footer "$FOOTER" \
            --arg url "$URL" \
            --argjson color "$COLOR" \
            --arg timestamp "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{
                username: $username,
                embeds: [
                {
                    title: $title,
                    description: $desc,
                    url: $url,
                    color: $color,
                    footer: { text: $footer },
                    timestamp: $timestamp
                }
                ]
            }')

            HTTP_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Content-Type: application/json" \
                -X POST \
                -d "$PAYLOAD" \
                "${{ secrets.DISCORD_WEBHOOK }}")

            if [ "$HTTP_RESPONSE" -ne 204 ]; then
                echo "Failed with status $HTTP_RESPONSE"
                exit 1
            fi
